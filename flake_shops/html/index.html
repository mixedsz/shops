<html>
<head>
    <meta charset="utf-8">
    <title>Black Market</title>

    <!-- Required for FiveM NUI -->
    <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
    <link href="style.css" rel="stylesheet" type="text/css" />

    <!-- Optional fonts -->
    <link href='https://fonts.googleapis.com/css?family=Arizonia' rel='stylesheet' type='text/css'>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet">

    <!-- jQuery UI references (optional) -->
    <link rel="stylesheet" href="//code.jquery.com/ui/1.12.1/themes/smoothness/jquery-ui.css">
    <script src="//code.jquery.com/jquery-1.12.4.js"></script>
    <script src="//code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
</head>

<body>
    <div id="bg"></div>
    <div id="wrapper">
        <div id="inner_wrap">
            <div id="shopdisplay">
                <div id="menuwrap">
                    <div class="shoptitle" id="shopname">Black Market</div>
                    <div class="shoptitle" id="status"></div>
                    <input type="text" id="search" placeholder="🔎 Search item" value="" />
                </div>
                <div id="itembox"></div>
            </div>

            <div id="cartdisplay">
                <div id="carticon" class="carttitle">
                    <span class="carticon">
                        <img src="img/carticon.png" height="22" width="22"/>
                    </span>
                    <span class="cartname">
                        SHOPPING CART - <div id="cartCount">0 ITEMS</div>
                    </span>
                </div>
                <div id="cart"></div>
            </div>
        </div>
    </div>

    <!-- Our main JS for the shop -->
    <script src="script.js" type="text/javascript"></script>
</body>
</html>
